<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NileDrip | Wishlist</title>
    <link rel="stylesheet" href="../CSS/style-base.css">
    <link rel="stylesheet" href="../CSS/style-shop.css">
</head>
<body>
<nav class="navbar">
    <div class="container">
        <div class="navbar-brand">
            <a href="../index.html" class="logo">
                <span class="nile">NILE</span><span class="drip">DRIP</span>
            </a>
        </div>
        <div class="navbar-menu" id="navbarMenu">
            <a href="shop.html" class="nav-link">Shop</a>
            <a href="login.html" class="nav-link">Login</a>
            <a href="signup.html" class="nav-link">Sign Up</a>
        </div>

        <a href="wishlist.html" class="cart-icon-btn wishlist-icon-btn" aria-label="Wishlist">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
            </svg>
        </a>

        <a href="cart.html" class="cart-icon-btn" aria-label="Cart">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"></circle>
                <circle cx="20" cy="21" r="1"></circle>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
            <span class="cart-nav-badge" id="cartNavBadge" style="display:none">0</span>
        </a>

        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
        </button>
        <button class="hamburger" id="hamburger">
            <span></span><span></span><span></span>
        </button>
    </div>
</nav>

<section class="shop-header">
    <div class="container">
        <h1>Your Wishlist</h1>
        <p>Saved products you want to buy later</p>
    </div>
</section>

<section class="shop-section">
    <div class="container">
        <div id="wishlistEmpty" class="no-products" style="display:none;">
            <p>Your wishlist is empty.</p>
            <a href="shop.html" class="btn btn-primary">Browse Products</a>
        </div>
        <div id="wishlistGrid" class="products-grid"></div>
    </div>
</section>

<script src="../JS/store.js"></script>
<script src="../JS/db.js"></script>
<script src="../JS/utils.js"></script>
<script src="../JS/theme.js"></script>
<script src="../JS/main.js"></script>
<script src="../JS/wishlist.js"></script>
</body>
</html>
